<section class="page">
  <div class="header">
    <div>
      <h2>@if (isEdit()) { Editar autor } @else { Nuevo autor }</h2>
      <p class="muted">Completa los datos obligatorios (*) y guarda.</p>
    </div>
    <div class="actions">
      <a class="btn secondary" routerLink="/authors">Volver</a>
      <button class="btn primary" type="button" (click)="save()" [disabled]="loading()">Guardar</button>
    </div>
  </div>

  <div class="card">
    <form class="form" [formGroup]="form">
      <label>
        <span>Nombre completo *</span>
        <input type="text" formControlName="fullName" placeholder="Ej. Gabriel García Márquez" />
        @if (form.controls.fullName.touched && form.controls.fullName.invalid) {
          <small class="error">Nombre requerido (máx 200).</small>
        }
      </label>

      <label>
        <span>Correo electrónico *</span>
        <input type="email" formControlName="email" placeholder="autor@correo.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="error">Correo requerido y válido.</small>
        }
      </label>

      <label>
        <span>Fecha de nacimiento</span>
        <input type="date" formControlName="birthDate" />
      </label>

      <label>
        <span>Ciudad</span>
        <input type="text" formControlName="city" placeholder="Ej. Aracataca" />
      </label>
    </form>
  </div>
</section>
